<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Shadows+Into+Light&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
<title>Contact - Emma Guilbaud</title>
<link rel="stylesheet" href="contact.css">
</head>

<body>
  <main class="frame">
    <div class="arrows">&mdash; &mdash; &mdash;</div>
    <h1>Contactez-moi</h1>
    <p class="intro">Laissez-moi un petit mot ! Je reviens vers vous rapidement.</p>

    <form action="https://formspree.io/f/xreealel" method="POST" class="contact-form">
      <!-- Champ anti-spam (honeypot) : ne pas remplir -->
      <input type="text" name="_gotcha" style="display:none" aria-hidden="true">
      <!-- Redirection après envoi -->
      <input type="hidden" name="_next" value="http://localhost/portfolio/contact-success.html">
      
      <div class="form-group row">
        <div class="input-group">
          <label for="name">Votre nom *</label>
          <input id="name" name="name" placeholder="Jean Dupont" required />
        </div>
        <div class="input-group">
          <label for="email">Votre e-mail *</label>
          <input id="email" name="email" type="email" placeholder="exemple@mail.com" required />
        </div>
      </div>

      <div class="form-group">
        <div class="input-group">
          <label for="subject">Sujet</label>
          <input id="subject" name="subject" placeholder="Demande, question..." />
        </div>
      </div>

      <div class="form-group">
        <div class="input-group">
          <label for="message">Votre message *</label>
          <textarea id="message" name="message" placeholder="Écrivez votre message ici…" required></textarea>
        </div>
      </div>

      <div class="submit-section">
        <button type="submit" class="btn-submit">Envoyer</button>
      </div>
    </form>

    <p class="postscript">Ou écrivez-moi sur 
      <a href="https://www.instagram.com/emma_g_designpro?igsh=MWFjdXRpOXBhaWFuNw%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer">Instagram</a> · 
      <a href="https://www.linkedin.com/in/emma-g-4809b5354" target="_blank" rel="noopener noreferrer">LinkedIn</a> · 
      <a href="https://www.facebook.com/share/1G7EeqjEGr/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">Facebook</a> · 
      <a href="mailto:e.guilbaud24@gmail.com">Email</a>
    </p>
  </main>

  <button onclick="window.location.href='index.html'" class="bouton-retour bouton-retour--bottom">
    <span class="fleche-retour" aria-hidden="true">
      <svg width="32" height="24" viewBox="0 0 32 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M28 12H4M4 12L12 4M4 12L12 20" stroke="#444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    Retour à l'accueil
  </button>
</body>
</html>
